### Stack locale — Directus + Postgres + Redis
### Next.js tourne en dehors (pnpm dev)
###
### Usage :
###   docker compose -f infra/local/docker-compose.yml up -d
###   ou : make infra-up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-app}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  directus:
    image: directus/directus:latest
    environment:
      SECRET: ${DIRECTUS_SECRET:-dev-secret-change-me}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-app_db}
      DB_USER: ${POSTGRES_USER:-app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-app_dev}
      REDIS_URL: redis://redis:6379
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@local.dev}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin123}
      PUBLIC_URL: http://localhost:8055
      CORS_ENABLED: true
      CORS_ORIGIN: 'http://localhost:3000'
      # Hook revalidation → Next.js
      NEXTJS_URL: http://host.docker.internal:3000
      NEXT_REVALIDATE_TOKEN: ${NEXT_REVALIDATE_TOKEN:-dev-revalidate-token}
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      REFRESH_TOKEN_COOKIE_SECURE: false
      REFRESH_TOKEN_COOKIE_SAME_SITE: lax
    volumes:
      - directus_uploads:/directus/uploads
      - ../../apps/directus/extensions:/directus/extensions
      - ../../apps/directus/snapshots:/directus/snapshots
    ports:
      - '8055:8055'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://localhost:8055/server/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  directus_uploads:
