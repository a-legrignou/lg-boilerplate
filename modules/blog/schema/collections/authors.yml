collection: authors
meta:
  note: 'Auteurs du blog pour lier le contenu aux profils.'
  icon: 'user'
  hidden: false
schema:
  name: authors
  display_template: '{{first_name}} {{last_name}}'
fields:
  - field: id
    type: uuid
    meta:
      interface: uuid
    schema:
      is_primary_key: true
      is_nullable: false
      default_value: 'uuid_generate_v4()'
  - field: first_name
    type: string
    meta:
      interface: input
      note: 'Prénom'
    schema:
      is_nullable: false
      max_length: 100
  - field: last_name
    type: string
    meta:
      interface: input
      note: 'Nom de famille'
    schema:
      is_nullable: false
      max_length: 100
  - field: slug
    type: string
    meta:
      interface: input
      note: "Identifiant URL de l'auteur"
    schema:
      is_nullable: false
      is_unique: true
      max_length: 191
  - field: bio
    type: text
    meta:
      interface: textarea
      note: 'Biographie courte'
    schema:
      is_nullable: true
  - field: avatar
    type: file
    meta:
      interface: file
      note: 'Photo de profil'
    schema:
      is_nullable: true
