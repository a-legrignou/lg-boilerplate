name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint + Typecheck
  # ──────────────────────────────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm prettier --check .

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

  # ──────────────────────────────────────────────
  # 2. Unit tests (Vitest)
  # ──────────────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm test --reporter=verbose

  # ──────────────────────────────────────────────
  # 3. E2E tests (Playwright) — PR only
  # ──────────────────────────────────────────────
  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright
        env:
          DIRECTUS_URL: http://localhost:8055
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_REVALIDATE_TOKEN: ci-token-placeholder
        run: pnpm --filter web test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 4. Build & push Docker image (main only)
  # ──────────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [quality, test-unit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_DIRECTUS_URL=${{ secrets.NEXT_PUBLIC_DIRECTUS_URL }}
            NEXT_PUBLIC_DIRECTUS_ASSETS=${{ secrets.NEXT_PUBLIC_DIRECTUS_ASSETS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 5a. Deploy — serveur FRONT (Next.js)
  # ──────────────────────────────────────────────
  deploy-front:
    name: Deploy → Front (Next.js)
    runs-on: ubuntu-latest
    needs: build
    if: vars.DEPLOY_ENABLED == 'true'
    environment: production
    concurrency:
      group: deploy-front
      cancel-in-progress: false

    steps:
      - name: Trigger Dokploy — front
        id: deploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.DOKPLOY_FRONT_API_URL }}/api/application.deploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_FRONT_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_FRONT_APP_ID }}"}')

          echo "HTTP status: $HTTP_STATUS"
          [ "$HTTP_STATUS" -eq 200 ] || (echo "Deploy front failed" && exit 1)

      - name: Healthcheck — front
        run: |
          echo "Attente du démarrage (60s)..."
          sleep 60
          MAX=10; DELAY=15
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SITE_URL }}/api/health")
            [ "$STATUS" -eq 200 ] && echo "✓ Front OK (tentative $i)" && exit 0
            echo "Tentative $i/$MAX — HTTP $STATUS, retry dans ${DELAY}s..."
            sleep $DELAY
          done
          echo "Healthcheck front échoué."
          exit 1

      - name: Rollback front
        if: failure()
        run: |
          curl -s -X POST \
            "${{ secrets.DOKPLOY_FRONT_API_URL }}/api/application.rollback" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_FRONT_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_FRONT_APP_ID }}"}'

  # ──────────────────────────────────────────────
  # 5b. Deploy — serveur BACK (Directus)
  #     Déclenché uniquement si des fichiers back ont changé
  # ──────────────────────────────────────────────
  deploy-back:
    name: Deploy → Back (Directus)
    runs-on: ubuntu-latest
    needs: build
    if: vars.DEPLOY_ENABLED == 'true'
    environment: production
    concurrency:
      group: deploy-back
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si le back a changé
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD | grep -qE '^(apps/directus|infra/back)' \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Trigger Dokploy — back
        if: steps.changed.outputs.changed == 'true'
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.DOKPLOY_BACK_API_URL }}/api/application.deploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_BACK_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_BACK_APP_ID }}"}')

          echo "HTTP status: $HTTP_STATUS"
          [ "$HTTP_STATUS" -eq 200 ] || (echo "Deploy back failed" && exit 1)

      - name: Healthcheck — back
        if: steps.changed.outputs.changed == 'true'
        run: |
          sleep 30
          MAX=6; DELAY=10
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DIRECTUS_PUBLIC_URL }}/server/health")
            [ "$STATUS" -eq 200 ] && echo "✓ Back OK (tentative $i)" && exit 0
            echo "Tentative $i/$MAX — HTTP $STATUS, retry dans ${DELAY}s..."
            sleep $DELAY
          done
          echo "Healthcheck back échoué."
          exit 1

      - name: Skipped
        if: steps.changed.outputs.changed == 'false'
        run: echo "Aucun changement dans apps/directus ou infra/back — déploiement back ignoré."
