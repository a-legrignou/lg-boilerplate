http:
  routers:
    web:
      rule: 'Host(`yourdomain.com`)'
      service: web
      middlewares:
        - https-redirect
    directus:
      rule: 'Host(`directus.yourdomain.com`)'
      service: directus
    minio:
      rule: 'Host(`minio.yourdomain.com`)'
      service: minio
      middlewares:
        - https-redirect
  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true
  services:
    web:
      loadBalancer:
        servers:
          - url: 'http://web:3000'
    directus:
      loadBalancer:
        servers:
          - url: 'http://directus:8055'
    minio:
      loadBalancer:
        servers:
          - url: 'http://minio:9000'

tls:
  certificates:
    - certFile: /etc/traefik/certs/cert.pem
      keyFile: /etc/traefik/certs/key.pem
