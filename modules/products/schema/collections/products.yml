collection: products
meta:
  note: 'Fiches produit prêtes à l’affichage catalogue.'
  icon: 'shopping-bag'
  hidden: false
schema:
  name: products
  display_template: '{{name}}'
fields:
  - field: id
    type: uuid
    meta:
      interface: uuid
    schema:
      is_primary_key: true
      is_nullable: false
      default_value: 'uuid_generate_v4()'
  - field: name
    type: string
    meta:
      interface: input
      note: 'Nom du produit'
    schema:
      is_nullable: false
      max_length: 191
  - field: slug
    type: string
    meta:
      interface: input
      note: 'Slug produit'
    schema:
      is_nullable: false
      is_unique: true
      max_length: 191
  - field: description
    type: text
    meta:
      interface: textarea
      note: 'Description courte'
    schema:
      is_nullable: true
  - field: details
    type: json
    meta:
      interface: json-editor
      note: 'Bloc de fonctionnalités et spécifications'
    schema:
      is_nullable: true
  - field: price
    type: decimal
    meta:
      interface: input
      note: 'Prix de base'
      width: half
    schema:
      is_nullable: false
      precision: 10
      scale: 2
      default_value: 0
  - field: status
    type: string
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: 'Draft'
            value: draft
          - text: 'Published'
            value: published
      display: labels
    schema:
      is_nullable: false
      default_value: draft
  - field: categories
    type: json
    meta:
      interface: json-editor
      note: 'Catégories liées'
    schema:
      is_nullable: true
  - field: cover_image
    type: file
    meta:
      interface: file
      note: 'Image produit principale'
    schema:
      is_nullable: true
